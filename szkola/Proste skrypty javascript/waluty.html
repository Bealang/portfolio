<!DOCTYPE html>

<body>
    <header>
        <h1>Skrypty Javascript i PHP</h1>
    </header>
    <section id="przelicznik">
        <h2>Przelicznik walut</h2>
        
        <div id="plninne">
            <h3>Zamiana PLN na inne waluty</h3>
            <input type="number" id="plnAmount" placeholder="Podaj kwotę w PLN">
            <select id="currencySelect">
                <option value="EUR">Euro (EUR)</option>
                <option value="GBP">Funt brytyjski (GBP)</option>
                <option value="CHF">Frank szwajcarski (CHF)</option>
                <option value="SEK">Korona szwedzka (SEK)</option>
                <option value="NOK">Korona norweska (NOK)</option>
                <option value="DKK">Korona duńska (DKK)</option>
                <option value="HUF">Forint węgierski (HUF)</option>
                <option value="CZK">Korona czeska (CZK)</option>
                <option value="RON">Lej rumuński (RON)</option>
                <option value="BGN">Lew bułgarski (BGN)</option>
            </select>
            <button onclick="convertPLN()" class="walutyprzelicz">Przelicz</button>
            <p id="plnResult"></p>
        </div>

        <div id="innepln">
            <h3>Zamiana walut na PLN</h3>

                <option value="RON">Lej rumuński (RON)</option>
                <option value="BGN">Lew bułgarski (BGN)</option>
            </select>
            <button onclick="convertToPLN()" class="walutyprzelicz">Przelicz</button>
            <p id="currencyResult"></p>
        </div>
    </section>
